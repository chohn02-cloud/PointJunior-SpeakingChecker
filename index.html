<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영어 발음 체크 🎤</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0e17; --card:#22213a; --accent4:#4d96ff;
  --correct:#6bcb77; --wrong:#ff6b6b; --partial:#ffd93d;
  --text:#fffffe; --muted:#a7a9be;
  --radius:20px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 600px 400px at 20% 20%,rgba(77,150,255,.07) 0%,transparent 70%),
             radial-gradient(ellipse 500px 300px at 80% 70%,rgba(255,107,107,.07) 0%,transparent 70%);
  pointer-events:none;z-index:0;}

.wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:20px 16px 60px;}

/* header */
header{text-align:center;padding:24px 0 16px;}
.logo{font-family:'Baloo 2',cursive;font-size:2.2rem;font-weight:800;
  background:linear-gradient(135deg,#4d96ff,#ffd93d);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{display:block;font-size:.9rem;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-top:-2px;}

/* scores */
.scores{display:flex;justify-content:center;gap:10px;margin:12px 0 20px;flex-wrap:wrap;}
.pill{background:var(--card);border-radius:50px;padding:6px 16px;
  display:flex;align-items:center;gap:6px;font-weight:700;font-size:.88rem;border:2px solid transparent;}
.pill.c{border-color:var(--correct);color:var(--correct);}
.pill.w{border-color:var(--wrong);color:var(--wrong);}
.pill.s{border-color:var(--partial);color:var(--partial);}
.pill big{font-size:1.2rem;}

/* mode tabs */
.tabs{display:flex;background:var(--card);border-radius:50px;padding:4px;gap:3px;margin-bottom:16px;}
.tab{flex:1;padding:8px;border:none;background:transparent;border-radius:50px;
  color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;transition:all .2s;}
.tab.on{background:linear-gradient(135deg,#4d96ff,#a78bfa);color:#fff;box-shadow:0 4px 14px rgba(77,150,255,.35);}

/* progress */
.prog-wrap{background:rgba(255,255,255,.06);border-radius:50px;height:5px;margin-bottom:14px;overflow:hidden;}
.prog-bar{height:100%;background:linear-gradient(90deg,#4d96ff,#a78bfa);border-radius:50px;transition:width .4s;}

/* word card */
.wcard{background:var(--card);border-radius:var(--radius);padding:26px 22px 20px;
  text-align:center;border:2px solid rgba(255,255,255,.06);
  box-shadow:0 8px 32px rgba(0,0,0,.4);transition:all .3s cubic-bezier(.34,1.56,.64,1);margin-bottom:14px;}
.wcard.ok {border-color:var(--correct);box-shadow:0 0 40px rgba(107,203,119,.25);animation:pulse .45s ease;}
.wcard.no {border-color:var(--wrong);  box-shadow:0 0 40px rgba(255,107,107,.25);animation:shake .35s ease;}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.025)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

.ctag{display:inline-block;background:rgba(77,150,255,.15);color:var(--accent4);
  border-radius:50px;padding:3px 12px;font-size:.72rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;}
.wword{font-family:'Baloo 2',cursive;font-size:3rem;font-weight:700;letter-spacing:-1px;line-height:1.1;margin-bottom:5px;}
.wphon{color:var(--muted);font-size:1rem;margin-bottom:7px;}
.wmean{color:var(--muted);font-size:.88rem;padding:5px 13px;background:rgba(255,255,255,.04);border-radius:9px;display:inline-block;}
.wex{margin-top:10px;font-size:.85rem;color:var(--muted);font-style:italic;line-height:1.6;}
.wex .hl{color:var(--partial);font-style:normal;font-weight:700;}

/* result */
.result-row{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px;min-height:48px;margin-top:12px;}
.badge{padding:7px 18px;border-radius:50px;font-weight:800;font-size:1rem;
  display:none;align-items:center;gap:6px;animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
.badge.show{display:inline-flex;}
.badge.ok {background:linear-gradient(135deg,#6bcb77,#4caf50);color:#fff;box-shadow:0 4px 16px rgba(107,203,119,.4);}
.badge.pt {background:linear-gradient(135deg,#ffd93d,#f6a700);color:#111;box-shadow:0 4px 16px rgba(255,217,61,.4);}
.badge.no {background:linear-gradient(135deg,#ff6b6b,#e53e3e);color:#fff;box-shadow:0 4px 16px rgba(255,107,107,.4);}
@keyframes pop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.heard{font-size:.85rem;color:var(--muted);background:rgba(255,255,255,.06);padding:5px 12px;border-radius:50px;display:none;}
.heard b{color:var(--text);}

/* ── MIC PANEL ── */
.mic-panel{background:var(--card);border-radius:var(--radius);
  border:2px solid rgba(255,255,255,.06);padding:20px 18px;margin-bottom:14px;text-align:center;}

/* big mic button */
.mic-btn{
  width:88px;height:88px;border-radius:50%;border:none;cursor:pointer;
  font-size:2.2rem;display:inline-flex;align-items:center;justify-content:center;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);position:relative;
  background:linear-gradient(135deg,#4d96ff,#a78bfa);
  box-shadow:0 8px 28px rgba(77,150,255,.45);
  margin-bottom:10px;
}
.mic-btn:hover{transform:scale(1.07);}
.mic-btn.listening{
  background:linear-gradient(135deg,#ff6b6b,#ff8c42);
  box-shadow:0 8px 28px rgba(255,107,107,.5);
  animation:mbPulse 1s infinite ease-in-out;
}
.mic-btn.listening::before{
  content:'';position:absolute;inset:-12px;border-radius:50%;
  border:3px solid rgba(255,107,107,.3);animation:rip 1s infinite;
}
.mic-btn.listening::after{
  content:'';position:absolute;inset:-22px;border-radius:50%;
  border:2px solid rgba(255,107,107,.15);animation:rip 1s infinite .25s;
}
@keyframes mbPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes rip{0%{transform:scale(.8);opacity:1}100%{transform:scale(1.3);opacity:0}}

.mic-hint{font-weight:700;font-size:.9rem;color:var(--muted);margin-bottom:6px;min-height:22px;transition:color .2s;}
.mic-hint.live{color:var(--wrong);font-size:.95rem;}

/* waveform */
.wave{height:44px;display:flex;align-items:center;justify-content:center;gap:3px;margin:8px 0 4px;}
.wb{width:4px;border-radius:4px;background:rgba(77,150,255,.2);min-height:4px;transition:height .08s;}
.wave.on .wb{background:var(--accent4);}

/* listen btn */
.btn-listen{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);
  color:var(--text);padding:8px 18px;border-radius:50px;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;
  cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;margin-bottom:14px;}
.btn-listen:hover{background:rgba(255,255,255,.12);transform:translateY(-2px);}

/* nav */
.nav{display:flex;gap:10px;justify-content:center;margin-top:2px;}
.btn{padding:10px 22px;border-radius:50px;font-family:'Nunito',sans-serif;font-weight:800;
  font-size:.88rem;cursor:pointer;border:none;transition:all .2s cubic-bezier(.34,1.56,.64,1);}
.btn:hover{transform:translateY(-3px);}
.btn-p{background:linear-gradient(135deg,#4d96ff,#a78bfa);color:#fff;box-shadow:0 5px 16px rgba(77,150,255,.35);}
.btn-g{background:var(--card);color:var(--muted);border:2px solid rgba(255,255,255,.1);}
.btn-g:hover{color:var(--text);}

/* word grid */
.wordlist{margin-top:24px;}
.sec-t{font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:700;color:var(--muted);margin-bottom:9px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
.chip{background:var(--card);border:2px solid rgba(255,255,255,.06);border-radius:13px;
  padding:10px 11px;cursor:pointer;transition:all .2s;text-align:center;}
.chip:hover{border-color:var(--accent4);transform:translateY(-3px);}
.chip.dc{border-color:var(--correct);background:rgba(107,203,119,.08);}
.chip.dw{border-color:var(--wrong);background:rgba(255,107,107,.08);}
.chip.ac{border-color:var(--accent4);background:rgba(77,150,255,.1);}
.chip-w{font-weight:800;font-size:.9rem;display:block;}
.chip-i{font-size:.9rem;display:block;margin-top:1px;}

/* custom */
.custom{background:var(--card);border-radius:var(--radius);padding:16px;margin-top:12px;
  border:2px solid rgba(255,255,255,.06);display:none;}
.custom.on{display:block;}
.cust-l{font-weight:800;font-size:.88rem;color:var(--muted);margin-bottom:9px;}
.cust-row{display:flex;gap:8px;}
.cust-in{flex:1;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);
  border-radius:11px;padding:9px 13px;color:var(--text);
  font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:600;outline:none;transition:border-color .2s;}
.cust-in:focus{border-color:var(--accent4);}
.cust-in::placeholder{color:var(--muted);}

/* streak */
.streak{display:none;text-align:center;padding:10px;
  background:rgba(255,217,61,.1);border:2px solid rgba(255,217,61,.28);
  border-radius:13px;margin:10px 0;font-weight:800;color:var(--partial);font-size:.9rem;
  animation:pop .4s cubic-bezier(.34,1.56,.64,1);}
.streak.on{display:block;}

/* tip */
.tip{background:rgba(77,150,255,.07);border:1.5px solid rgba(77,150,255,.17);
  border-radius:13px;padding:12px 15px;margin-top:14px;font-size:.82rem;color:var(--muted);line-height:1.6;}
.tip b{color:var(--accent4);}

/* confetti */
#cv{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
@media(max-width:480px){.wword{font-size:2.3rem;}.logo{font-size:1.9rem;}.mic-btn{width:76px;height:76px;font-size:1.9rem;}}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="wrap">

<header>
  <div class="logo">🎤 PronouncePal<span class="logo-sub">말하면 바로 채점!</span></div>
</header>

<div class="scores">
  <div class="pill c">✅ 맞음 <big id="sc-c">0</big></div>
  <div class="pill w">❌ 틀림 <big id="sc-w">0</big></div>
  <div class="pill s">🔥 연속 <big id="sc-s">0</big></div>
</div>

<div class="tabs">
  <button class="tab on" onclick="setMode('school')">🏫 학교 필수</button>
  <button class="tab" onclick="setMode('phrases')">💬 생활 표현</button>
  <button class="tab" onclick="setMode('custom')">✏️ 직접 입력</button>
</div>

<div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0"></div></div>

<!-- word card -->
<div class="wcard" id="wcard">
  <div class="ctag" id="ctag">Category</div>
  <div class="wword" id="wword">시작해요!</div>
  <div class="wphon" id="wphon"></div>
  <div class="wmean" id="wmean"></div>
  <div class="wex"   id="wex"></div>
  <div class="result-row">
    <span class="badge" id="badge"></span>
    <span class="heard" id="heard">들린 발음: <b id="heard-w"></b></span>
  </div>
</div>

<div class="streak" id="streak"></div>

<!-- mic panel -->
<div class="mic-panel">
  <button class="btn-listen" onclick="speakWord()">🔊 원어민 발음 듣기</button><br>
  <div class="wave" id="wave"></div>
  <button class="mic-btn" id="mic-btn" onclick="toggleListen()">🎤</button>
  <div class="mic-hint" id="mic-hint">버튼을 누르고 바로 말하세요</div>
</div>

<div class="nav">
  <button class="btn btn-g" onclick="nextWord()">⏭ 건너뛰기</button>
  <button class="btn btn-p" onclick="nextWord()">다음 단어 →</button>
</div>

<div class="wordlist">
  <div class="sec-t">📚 단어 목록</div>
  <div class="grid" id="grid"></div>
</div>

<div class="custom" id="custom-box">
  <div class="cust-l">✏️ 단어 또는 문장 추가</div>
  <div class="cust-row">
    <input class="cust-in" id="cust-in" placeholder="영어 단어나 문장 입력…"/>
    <button class="btn btn-p" onclick="addCustom()">추가</button>
  </div>
</div>

<div class="tip">
  💡 <b>사용법:</b> 🔊 원어민 발음 먼저 듣고 → 🎤 버튼 누르고 바로 말하면 <b>즉시 채점!</b><br>
  <b>Chrome / Samsung Internet</b> 브라우저에서 작동합니다. 마이크 권한을 허용해 주세요.
</div>

</div><!-- /wrap -->
<script>
// ── DATA ──────────────────────────────────────────
const WORDS = {
  school:[
    {word:'apple',       ph:'/ˈæp.əl/',          mean:'사과',      cat:'과일',  ex:'I eat an {apple} every day.'},
    {word:'banana',      ph:'/bəˈnɑː.nə/',        mean:'바나나',    cat:'과일',  ex:'This {banana} is yellow.'},
    {word:'beautiful',   ph:'/ˈbjuː.tɪ.fəl/',     mean:'아름다운', cat:'형용사',ex:'She has a {beautiful} smile.'},
    {word:'comfortable', ph:'/ˈkʌm.fər.tə.bəl/',  mean:'편안한',   cat:'형용사',ex:'This chair is very {comfortable}.'},
    {word:'vocabulary',  ph:'/voʊˈkæb.jʊ.ler.i/', mean:'어휘',     cat:'학습',  ex:'Study your {vocabulary} daily.'},
    {word:'interesting', ph:'/ˈɪn.trɪ.stɪŋ/',     mean:'흥미로운', cat:'형용사',ex:'This book is very {interesting}.'},
    {word:'challenge',   ph:'/ˈtʃæl.ɪndʒ/',       mean:'도전',     cat:'명사',  ex:'English is a great {challenge}.'},
    {word:'necessary',   ph:'/ˈnes.ə.ser.i/',      mean:'필요한',   cat:'형용사',ex:'It is {necessary} to study hard.'},
    {word:'environment', ph:'/ɪnˈvaɪ.rən.mənt/',  mean:'환경',     cat:'명사',  ex:'Protect our {environment}.'},
    {word:'strawberry',  ph:'/ˈstrɔː.ber.i/',      mean:'딸기',     cat:'과일',  ex:'I love {strawberry} ice cream.'},
    {word:'schedule',    ph:'/ˈsked.juːl/',        mean:'일정',     cat:'명사',  ex:'Check my {schedule} first.'},
    {word:'temperature', ph:'/ˈtem.prɪ.tʃər/',    mean:'온도',     cat:'명사',  ex:'The {temperature} is rising.'},
  ],
  phrases:[
    {word:'How are you',               ph:'/haʊ ɑːr juː/',                  mean:'안녕하세요?',       cat:'인사',  ex:'{How are you} doing today?'},
    {word:'Nice to meet you',          ph:'/naɪs tə miːt juː/',             mean:'만나서 반가워요',  cat:'인사',  ex:'{Nice to meet you}, I\'m Sara.'},
    {word:'Excuse me',                 ph:'/ɪkˈskjuːz miː/',               mean:'실례합니다',       cat:'예절',  ex:'{Excuse me}, can you help me?'},
    {word:'Thank you very much',       ph:'/θæŋk juː ˈver.i mʌtʃ/',        mean:'정말 감사해요',    cat:'예절',  ex:'{Thank you very much}!'},
    {word:'Could you repeat that',     ph:'/kʊd juː rɪˈpiːt ðæt/',         mean:'다시 말해 주세요', cat:'대화',  ex:'{Could you repeat that}, please?'},
    {word:'What do you think',         ph:'/wɒt duː juː θɪŋk/',            mean:'어떻게 생각해요?', cat:'대화',  ex:'{What do you think} about this?'},
    {word:'I understand',              ph:'/aɪ ˌʌn.dəˈstænd/',             mean:'이해했어요',       cat:'대화',  ex:'{I understand} what you mean.'},
    {word:'I am looking forward to it',ph:'/aɪm ˈlʊk.ɪŋ ˈfɔːrd tuː ɪt/',  mean:'기대하고 있어요',  cat:'표현',  ex:'{I am looking forward to it}!'},
  ],
};

let customList=[], mode='school', words=[], idx=0;
let cN=0, wN=0, streak=0, results={};
let recog=null, listening=false, animId=null;
let audioCtx=null, analyser=null;

// ── WAVEFORM ──────────────────────────────────────
const waveEl=document.getElementById('wave');
for(let i=0;i<24;i++){const b=document.createElement('div');b.className='wb';b.style.height='4px';waveEl.appendChild(b);}
const wBars=waveEl.querySelectorAll('.wb');

function animWave(on){
  waveEl.className='wave'+(on?' on':'');
  if(animId){cancelAnimationFrame(animId);animId=null;}
  if(!on){wBars.forEach(b=>b.style.height='4px');return;}
  function draw(){
    if(analyser){
      const d=new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(d);
      const step=Math.floor(d.length/wBars.length);
      wBars.forEach((b,i)=>{const v=d[i*step]||0;b.style.height=Math.max(4,(v/255)*40)+'px';});
    } else {
      const t=Date.now()/180;
      wBars.forEach((b,i)=>{b.style.height=Math.max(4,12+Math.sin(t+i*.6)*9)+'px';});
    }
    animId=requestAnimationFrame(draw);
  }
  draw();
}

// ── SPEECH RECOGNITION ────────────────────────────
function toggleListen(){
  if(listening) stopListen();
  else startListen();
}

async function startListen(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('mic-hint').textContent='⚠️ Chrome / Samsung 브라우저에서 사용 가능해요';
    return;
  }

  // 마이크 시각화용 audioContext (선택)
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser(); analyser.fftSize=256;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
  }catch(e){ analyser=null; }

  recog=new SR();
  recog.lang='en-US';
  recog.continuous=false;
  recog.interimResults=false;
  recog.maxAlternatives=5;

  recog.onstart=()=>{
    listening=true;
    document.getElementById('mic-btn').classList.add('listening');
    document.getElementById('mic-btn').textContent='⏹';
    const h=document.getElementById('mic-hint');
    h.textContent='🔴 듣고 있어요… 지금 말하세요!';
    h.classList.add('live');
    animWave(true);
    clearResult();
  };

  // ★ 결과 나오면 즉시 채점 — 대기 없음
  recog.onresult=(e)=>{
    const alts=Array.from(e.results[0]).map(r=>r.transcript.trim().toLowerCase());
    stopListen();
    grade(alts);
  };

  recog.onerror=(e)=>{
    stopListen();
    const msg={
      'no-speech':'소리가 안 들렸어요. 더 크게 말해보세요! 🔈',
      'not-allowed':'마이크 권한이 필요해요. 브라우저에서 허용해 주세요.',
      'network':'인터넷 연결을 확인해 주세요.',
    };
    document.getElementById('mic-hint').textContent = msg[e.error]||'다시 시도해 주세요.';
  };

  recog.onend=()=>{ if(listening) stopListen(); };
  recog.start();
}

function stopListen(){
  listening=false;
  try{recog&&recog.stop();}catch(e){}
  if(audioCtx){try{audioCtx.close();}catch(e){} audioCtx=null; analyser=null;}
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('mic-btn').textContent='🎤';
  const h=document.getElementById('mic-hint');
  h.textContent='버튼을 누르고 바로 말하세요';
  h.classList.remove('live');
  animWave(false);
}

// ── GRADING ───────────────────────────────────────
function grade(alts){
  const target=words[idx]; if(!target) return;
  const tn=target.word.toLowerCase().replace(/[^a-z\s]/g,'').trim();
  const heard=alts[0]||'';
  const hn=heard.replace(/[^a-z\s]/g,'').trim();

  // 1) 완전 일치 (모든 후보 중)
  let g='wrong';
  for(const a of alts){
    if(a.replace(/[^a-z\s]/g,'').trim()===tn){g='correct';break;}
  }
  // 2) 부분 일치
  if(g!=='correct'){
    const tw=tn.split(' '), hw=hn.split(' ');
    const m=tw.filter(w=>hw.some(h=>h===w||lev(h,w)<=1));
    if(m.length/tw.length>=0.65) g='partial';
  }

  // 결과 표시
  const card=document.getElementById('wcard');
  const badge=document.getElementById('badge');
  const heardEl=document.getElementById('heard');
  card.classList.remove('ok','no');

  document.getElementById('heard-w').textContent=heard||'(인식 안 됨)';
  heardEl.style.display='inline-block';

  if(g==='correct'){
    badge.className='badge ok show'; badge.innerHTML='✅ 완벽해요!';
    card.classList.add('ok');
    cN++; streak++; results[idx]='correct';
    document.getElementById('mic-hint').textContent='🎉 정확해요! 다음으로 넘어가세요!';
    if(streak>=3) showStreak();
    if(streak===5) confetti();
  } else if(g==='partial'){
    badge.className='badge pt show'; badge.innerHTML='🟡 거의 맞았어요!';
    card.classList.add('no');
    streak=0; results[idx]='partial';
    document.getElementById('mic-hint').textContent='👍 한 번 더 해보면 완벽!';
  } else {
    badge.className='badge no show'; badge.innerHTML='❌ 다시 해봐요!';
    card.classList.add('no');
    wN++; streak=0; results[idx]='wrong';
    document.getElementById('mic-hint').textContent='💪 🔊 원어민 발음 듣고 다시 도전!';
  }
  updateUI();
}

function clearResult(){
  document.getElementById('badge').className='badge';
  document.getElementById('heard').style.display='none';
  document.getElementById('streak').classList.remove('on');
  document.getElementById('wcard').classList.remove('ok','no');
}

// ── TTS ───────────────────────────────────────────
function speakWord(){
  const s=window.speechSynthesis; if(!s) return; s.cancel();
  const u=new SpeechSynthesisUtterance(words[idx]?.word||'');
  u.lang='en-US'; u.rate=0.82;
  const v=s.getVoices().find(x=>x.lang.startsWith('en')&&x.localService)||s.getVoices().find(x=>x.lang.startsWith('en'));
  if(v) u.voice=v;
  s.speak(u);
}

// ── WORD / MODE ───────────────────────────────────
function setMode(m){
  mode=m;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['school','phrases','custom'][i]===m));
  document.getElementById('custom-box').classList.toggle('on',m==='custom');
  words=m==='custom'?[...customList]:[...WORDS[m]];
  idx=0; cN=0; wN=0; streak=0; results={};
  updateUI(); renderGrid();
  if(words.length) loadWord(0);
  else document.getElementById('wword').textContent='단어를 추가하세요';
}

function loadWord(i){
  idx=i;
  const w=words[i];
  document.getElementById('wcard').classList.remove('ok','no');
  document.getElementById('ctag').textContent=w.cat||'Word';
  document.getElementById('wword').textContent=w.word;
  document.getElementById('wphon').textContent=w.ph||'';
  document.getElementById('wmean').textContent=w.mean||'';
  document.getElementById('wex').innerHTML=w.ex?'📖 '+w.ex.replace(/\{(.+?)\}/g,'<span class="hl">$1</span>'):'';
  document.getElementById('badge').className='badge';
  document.getElementById('heard').style.display='none';
  document.getElementById('streak').classList.remove('on');
  document.getElementById('mic-hint').textContent='버튼을 누르고 바로 말하세요';
  document.getElementById('mic-hint').classList.remove('live');
  updateProg(); highlightChip(i);
}

function nextWord(){ if(!words.length) return; stopListen(); loadWord((idx+1)%words.length); }

function addCustom(){
  const v=document.getElementById('cust-in').value.trim(); if(!v) return;
  customList.push({word:v,ph:'',mean:'직접 입력',cat:'사용자',ex:''});
  words=[...customList];
  document.getElementById('cust-in').value='';
  renderGrid(); loadWord(words.length-1);
}

// ── UI HELPERS ────────────────────────────────────
function updateUI(){
  document.getElementById('sc-c').textContent=cN;
  document.getElementById('sc-w').textContent=wN;
  document.getElementById('sc-s').textContent=streak;
  updateProg(); renderGrid();
}
function updateProg(){
  const d=Object.keys(results).length;
  document.getElementById('prog').style.width=(words.length?d/words.length*100:0)+'%';
}
function showStreak(){
  const el=document.getElementById('streak');
  el.textContent=`🔥 ${streak}연속 정답! 대단해요!`;
  el.classList.add('on');
}
function renderGrid(){
  const g=document.getElementById('grid'); g.innerHTML='';
  words.forEach((w,i)=>{
    const c=document.createElement('div'); c.className='chip';
    if(results[i]==='correct') c.classList.add('dc');
    else if(results[i]) c.classList.add('dw');
    if(i===idx) c.classList.add('ac');
    const ico=results[i]==='correct'?'✅':results[i]==='wrong'?'❌':results[i]==='partial'?'🟡':'⬜';
    c.innerHTML=`<span class="chip-w">${w.word}</span><span class="chip-i">${ico}</span>`;
    c.onclick=()=>{stopListen();loadWord(i);};
    g.appendChild(c);
  });
}
function highlightChip(i){
  document.querySelectorAll('.chip').forEach((c,j)=>c.classList.toggle('ac',j===i));
}
function lev(a,b){
  const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>j===0?i:0));
  for(let j=1;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

// ── CONFETTI ──────────────────────────────────────
function confetti(){
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  const cols=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#a78bfa','#ff8c42'];
  const ps=Array.from({length:120},()=>({x:Math.random()*cv.width,y:Math.random()*-cv.height,w:Math.random()*11+5,h:Math.random()*5+3,color:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*Math.PI*2,vx:(Math.random()-.5)*3,vy:Math.random()*4+2,vr:(Math.random()-.5)*.2}));
  let f=0;
  (function draw(){ctx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});if(++f<120)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);})();
}

// ── BOOT ──────────────────────────────────────────
if(window.speechSynthesis){speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();speechSynthesis.getVoices();}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('cust-in')?.addEventListener('keydown',e=>{if(e.key==='Enter')addCustom();});
});
setMode('school');
</script>
